    function App() {
      const [searchQuery, setSearchQuery] = useState('');
      const [onlyBarrierFree, setOnlyBarrierFree] = useState(false);
      const [expandedStation, setExpandedStation] = useState(null);

      const filteredStations = STATIONS.filter(station => {
        const matchesSearch = station.stationName.includes(searchQuery) ||
                              station.accessibilityByLine.some(l => l.line.includes(searchQuery));
        const isAllOk = station.accessibilityByLine.every(l => l.canBoardIndependently);
        const matchesToggle = !onlyBarrierFree || isAllOk;
        return matchesSearch && matchesToggle;
      });

        <div className="min-h-screen pb-24 max-w-[680px] mx-auto">

              <h1 className="text-lg font-bold tracking-tight text-slate-900">地下鉄バリアフリーナビ</h1>
            </div>
            <p className="text-[11px] text-slate-500">東京23区 地下鉄 · 単独乗降（段差5cm以内）ルート検索</p>
          </header>

                  placeholder="駅名・路線名で検索（例：銀座、副都心線）"
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                  className="w-full pl-10 pr-10 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-[15px]"
                />
                {searchQuery && (
                  <button onClick={() => setSearchQuery('')} className="absolute right-3 top-[14px] text-slate-400 hover:text-slate-600">
                    <i className="ti ti-x text-lg"></i>
                  </button>
                )}
              </div>

              <div className="flex items-center justify-between bg-slate-50 p-3 rounded-lg">
                <span className="text-[13px] font-medium text-slate-600 flex items-center gap-1.5">
                  <i className="ti ti-filter text-slate-400"></i>
                  全路線で単独乗降可能な駅のみ
                </span>
                <button
                  onClick={() => setOnlyBarrierFree(!onlyBarrierFree)}
                  className={"relative inline-flex h-6 w-11 items-center rounded-full transition-colors " + (onlyBarrierFree ? "bg-indigo-600" : "bg-slate-300")}
                >
                  <span className={"inline-block h-4 w-4 transform rounded-full bg-white transition-transform " + (onlyBarrierFree ? "translate-x-6" : "translate-x-1")} />
                </button>
              </div>
            </div>

            <div className="text-xs font-medium text-slate-500 px-1">
              該当する駅: {filteredStations.length} 件
            </div>

            <div className="space-y-3">
              {filteredStations.map(station => {
                const isExpanded = expandedStation === station.id;
                const allOk = station.accessibilityByLine.every(l => l.canBoardIndependently);
                const someOk = station.accessibilityByLine.some(l => l.canBoardIndependently);
                
                const statusColor = allOk ? "text-emerald-700 bg-emerald-50 border-emerald-200" : 
                                    someOk ? "text-amber-700 bg-amber-50 border-amber-200" : 
                                    "text-rose-700 bg-rose-50 border-rose-200";
                const statusText = allOk ? "全路線 単独可" : someOk ? "路線により異なる" : "全路線 要係員";
                const statusIcon = allOk ? "ti-circle-check" : someOk ? "ti-alert-circle" : "ti-circle-x";

                return (
                  <div key={station.id} className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden transition-all">
                    <div 
                      className="p-4 flex items-start justify-between gap-2 cursor-pointer hover:bg-slate-50"
                      onClick={() => setExpandedStation(isExpanded ? null : station.id)}
                    >
                      <div className="space-y-2.5 flex-1">
                        <div className="flex items-center gap-2 flex-wrap">
                          <span className="text-[17px] font-bold text-slate-900">{station.stationName}駅</span>
                          {station.hasWheelchairToilet && (
                            <span className="inline-flex items-center gap-1 px-1.5 py-0.5 rounded text-[11px] font-bold bg-teal-50 text-teal-700 border border-teal-100">
                              <i className="ti ti-accessible text-[12px]"></i>トイレあり
                            </span>
                          )}
                        </div>

                          <i className={"ti text-[13px] " + statusIcon}></i>{statusText}
                        </div>
                        <div className="flex flex-wrap gap-1.5">

                            const lIcon = l.canBoardIndependently ? "ti-circle-check opacity-80" : "ti-alert-triangle text-red-600 opacity-90";
                            return (
                              <span key={i} className={"inline-flex items-center gap-1 text-[11px] font-bold px-2 py-0.5 rounded-full " + lColor}>
                                <i className={"ti text-[12px] " + lIcon}></i>
                                {l.line}
                              </span>
                            );
                          })}
                        </div>
                      </div>
                      <i className={"ti ti-chevron-down text-xl text-slate-400 mt-1 transition-transform " + (isExpanded ? "rotate-180" : "")}></i>
                    </div>

                    {isExpanded && (
                      <div className="border-t border-slate-100 bg-slate-50 p-4 space-y-5">
                        
                        <div className="space-y-2">
                          <div className="flex items-center gap-1.5 text-slate-500 font-bold text-[12px]">
                            <i className="ti ti-elevator text-indigo-500"></i>地上エレベーターの目印
                          </div>
                          <div className="bg-white rounded-lg p-3 border border-slate-200 shadow-sm">
                            <p className="text-[14px] text-slate-800 font-medium mb-3 pl-1 leading-relaxed">
                              {station.surfaceElev
