<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>バリアフリー駅案内 v4</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F2EC;
  --surface:#FFFFFF;
  --ink:#1A1A19;
  --ink-2:#55534E;
  --ink-3:#8A8780;
  --line:#E6E2D8;
  --line-2:#D1CCBF;
  --go:#1D9E75;
  --go-bg:#DCF1E7;
  --go-ink:#0B5A41;
  --caution:#E08A1A;
  --caution-bg:#FBECD2;
  --caution-ink:#7A4806;
  --stop:#E24B4A;
  --stop-bg:#FBDDDC;
  --stop-ink:#7A1B1A;
  --accent:#185FA5;
  --accent-bg:#E6EEF8;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{font-family:'Noto Sans JP',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--ink);}
body{padding:18px 14px 80px;line-height:1.55;}
.app{max-width:680px;margin:0 auto;}

/* ---------- HEADER ---------- */
.header{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.header-icon{width:46px;height:46px;border-radius:14px;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.header-icon i{font-size:24px;}
.header h1{font-size:20px;font-weight:700;letter-spacing:.01em;line-height:1.2;}
.header p{font-size:12px;color:var(--ink-2);margin-top:2px;}
.header p a{color:var(--accent);text-decoration:none;}

/* ---------- LEGEND ---------- */
.legend{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin-bottom:14px;}
.legend-title{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--ink-3);letter-spacing:.12em;margin-bottom:10px;text-transform:uppercase;}
.legend-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.legend-item{display:flex;flex-direction:column;align-items:flex-start;gap:6px;padding:8px 6px;border-radius:10px;}
.legend-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;}
.legend-dot i{font-size:14px;}
.legend-item .lt{font-size:12px;font-weight:700;color:var(--ink);}
.legend-item .ls{font-size:11px;color:var(--ink-2);line-height:1.35;}
.dot-go{background:var(--go);}
.dot-caution{background:var(--caution);}
.dot-stop{background:var(--stop);}

/* ---------- SEARCH ---------- */
.search-bar{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:10px;transition:border-color .15s;}
.search-bar:focus-within{border-color:var(--ink);}
.search-bar i{font-size:18px;color:var(--ink-3);flex-shrink:0;}
.search-bar input{border:none;background:transparent;font-size:15px;color:var(--ink);flex:1;outline:none;font-family:inherit;}
.search-bar input::placeholder{color:var(--ink-3);}
.clear-btn{background:#EEE9DD;border:none;cursor:pointer;color:var(--ink-2);width:22px;height:22px;border-radius:50%;display:none;align-items:center;justify-content:center;flex-shrink:0;}
.clear-btn i{font-size:13px;}
.search-bar.has-value .clear-btn{display:flex;}

/* ---------- FILTER CHIPS ---------- */
.chips{display:flex;gap:8px;overflow-x:auto;padding:2px 0 6px;margin:0 -14px 6px;padding-left:14px;padding-right:14px;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:500;color:var(--ink-2);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;font-family:inherit;}
.chip:hover{border-color:var(--line-2);}
.chip.active{background:var(--ink);color:#fff;border-color:var(--ink);}
.chip .chip-count{font-size:11px;font-weight:700;background:rgba(0,0,0,.07);color:var(--ink-2);padding:1px 7px;border-radius:999px;}
.chip.active .chip-count{background:rgba(255,255,255,.22);color:#fff;}
.chip i{font-size:14px;}

/* ---------- COUNT ---------- */
.count-row{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--ink-3);padding:4px 4px 10px;}
.count-row strong{color:var(--ink);font-weight:700;}

/* ---------- CARD ---------- */
.station-card{background:var(--surface);border:1px solid var(--line);border-radius:18px;margin-bottom:10px;overflow:hidden;transition:border-color .2s,box-shadow .2s;}
.station-card:hover{border-color:var(--line-2);}
.station-card.open{border-color:var(--ink);box-shadow:0 4px 20px -8px rgba(0,0,0,.12);}
.card-top{padding:16px;cursor:pointer;display:flex;align-items:center;gap:14px;min-height:74px;}

/* Big status indicator */
.status-orb{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;position:relative;}
.status-orb i{font-size:26px;}
.status-orb.go{background:var(--go);}
.status-orb.caution{background:var(--caution);}
.status-orb.stop{background:var(--stop);}
.status-orb::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:2px solid transparent;}
.station-card.open .status-orb::after{border-color:currentColor;}
.station-card.open .status-orb.go{color:var(--go);}
.station-card.open .status-orb.caution{color:var(--caution);}
.station-card.open .status-orb.stop{color:var(--stop);}

.card-main{flex:1;min-width:0;}
.station-name{font-size:18px;font-weight:700;letter-spacing:.01em;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.toilet-pill{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;color:var(--go-ink);background:var(--go-bg);padding:2px 7px;border-radius:999px;}
.toilet-pill i{font-size:11px;}
.status-label{font-size:13px;font-weight:500;margin-top:3px;}
.status-label.go{color:var(--go-ink);}
.status-label.caution{color:var(--caution-ink);}
.status-label.stop{color:var(--stop-ink);}

.lines-summary{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;}
.line-chip{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;padding:2px 8px 2px 6px;border-radius:999px;}
.line-chip::before{content:'';width:6px;height:6px;border-radius:50%;}
.line-chip.ok::before{background:var(--go);}
.line-chip.ng::before{background:var(--stop);}

.chevron-btn{flex-shrink:0;width:30px;height:30px;border-radius:50%;background:#F3EFE5;color:var(--ink-2);display:flex;align-items:center;justify-content:center;transition:transform .25s;}
.chevron-btn i{font-size:16px;}
.station-card.open .chevron-btn{transform:rotate(180deg);background:var(--ink);color:#fff;}

/* ---------- DETAIL PANEL ---------- */
.detail-panel{max-height:0;overflow:hidden;transition:max-height .35s ease;}
.station-card.open .detail-panel{max-height:2000px;}
.detail-inner{padding:0 16px 18px;border-top:1px dashed var(--line);margin-top:0;padding-top:16px;}

.section-h{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;color:var(--ink-3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;}
.section-h i{font-size:13px;}

.elevator-card{background:linear-gradient(180deg,#F8F5EC 0%,#F3EFE3 100%);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:18px;}
.elev-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px;}
.elev-icon{width:34px;height:34px;border-radius:10px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.elev-icon i{font-size:18px;}
.elev-text{font-size:13.5px;line-height:1.5;flex:1;font-weight:500;}
.map-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--ink);color:#fff;border:none;border-radius:12px;padding:13px 16px;font-size:13.5px;font-weight:700;cursor:pointer;text-decoration:none;width:100%;font-family:inherit;transition:transform .1s;}
.map-btn:active{transform:scale(.98);}
.map-btn i{font-size:17px;}
.map-btn-sub{background:transparent;color:var(--ink);border:1px solid var(--line-2);margin-top:8px;font-weight:500;}
.map-btn-sub:hover{background:#F3EFE5;}

.map-fallbacks{display:flex;gap:8px;margin-top:10px;}
.map-fallback{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:5px;background:transparent;color:var(--ink-2);border:1px solid var(--line-2);border-radius:10px;padding:9px 8px;font-size:12px;font-weight:500;cursor:pointer;text-decoration:none;font-family:inherit;transition:background .15s;}
.map-fallback:hover{background:#F3EFE5;color:var(--ink);}
.map-fallback i{font-size:14px;}
.map-fallback.copied{background:var(--go-bg);color:var(--go-ink);border-color:var(--go);}
.map-fallback.copied i{color:var(--go);}

.lines-detail{display:flex;flex-direction:column;gap:8px;}
.line-row{display:flex;align-items:flex-start;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px;}
.line-row.ok{border-left:3px solid var(--go);}
.line-row.ng{border-left:3px solid var(--stop);}
.line-name-tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;flex-shrink:0;margin-top:1px;white-space:nowrap;}
.line-status-icon{font-size:20px;flex-shrink:0;margin-top:0;}
.line-status-icon.ok{color:var(--go);}
.line-status-icon.ng{color:var(--stop);}
.line-details-col{flex:1;min-width:0;}
.line-verdict{font-size:13px;font-weight:700;margin-bottom:3px;}
.line-verdict.ok{color:var(--go-ink);}
.line-verdict.ng{color:var(--stop-ink);}
.line-details-text{font-size:12px;color:var(--ink-2);line-height:1.55;}

.footer-link{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:var(--accent);text-decoration:none;margin-top:14px;font-weight:500;}
.footer-link i{font-size:12px;}

/* ---------- EMPTY ---------- */
.empty{text-align:center;padding:40px 20px;color:var(--ink-3);background:var(--surface);border:1px dashed var(--line-2);border-radius:16px;}
.empty i{font-size:40px;color:var(--line-2);display:block;margin-bottom:12px;}
.empty-t{font-size:14px;color:var(--ink-2);font-weight:500;}

/* ---------- HELP TIP ---------- */
.help-tip{display:none;margin-top:-4px;margin-bottom:14px;background:var(--accent-bg);border:1px solid #CADCF1;border-radius:12px;padding:10px 14px;font-size:12px;color:#143E68;line-height:1.55;}
.help-tip.show{display:flex;align-items:flex-start;gap:8px;}
.help-tip i{font-size:14px;color:var(--accent);flex-shrink:0;margin-top:2px;}
.help-close{margin-left:auto;background:none;border:none;cursor:pointer;color:#143E68;flex-shrink:0;padding:0;font-family:inherit;font-size:11px;font-weight:700;text-decoration:underline;}

</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header class="header">
    <div class="header-icon"><i class="ti ti-wheelchair"></i></div>
    <div>
      <h1>バリアフリー駅案内</h1>
      <p>東京23区の地下鉄／<a href="https://www.smoothmetro.jp/" target="_blank" rel="noopener">スムーズメトロ</a>のデータ（2022.3）</p>
    </div>
  </header>

  <!-- LEGEND -->
  <div class="legend" aria-label="マークの意味">
    <div class="legend-title"><i class="ti ti-info-circle"></i>マークの意味</div>
    <div class="legend-grid">
      <div class="legend-item">
        <div class="legend-dot dot-go"><i class="ti ti-check"></i></div>
        <div class="lt">ひとりで乗れる</div>
        <div class="ls">段差・隙間が小さく自走OK</div>
      </div>
      <div class="legend-item">
        <div class="legend-dot dot-caution"><i class="ti ti-alert-triangle"></i></div>
        <div class="lt">路線・方面による</div>
        <div class="ls">乗る前に確認しましょう</div>
      </div>
      <div class="legend-item">
        <div class="legend-dot dot-stop"><i class="ti ti-user-exclamation"></i></div>
        <div class="lt">駅員さんへ</div>
        <div class="ls">スロープ手配が必要</div>
      </div>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="search-bar" id="searchBar">
    <i class="ti ti-search"></i>
    <input type="text" id="searchInput" placeholder="駅名・路線名で検索（例：銀座、半蔵門線）" oninput="render()">
    <button class="clear-btn" onclick="clearSearch()" aria-label="クリア"><i class="ti ti-x"></i></button>
  </div>

  <!-- FILTER CHIPS -->
  <div class="chips" id="chips" role="tablist"></div>

  <!-- COUNT -->
  <div class="count-row">
    <span><strong id="countNum">0</strong> 駅</span>
    <span id="countContext"></span>
  </div>

  <div id="stationList"></div>
</div>

   hasWheelchairToilet:true,
   accessibilityByLine:[

// ----------- STATE -----------
let openId=null;
let activeFilter='all'; // all | go | toilet

function allOk(s){return s.accessibilityByLine.every(l=>l.canBoardIndependently);}
function someOk(s){return s.accessibilityByLine.some(l=>l.canBoardIndependently);}
function statusOf(s){
  if(allOk(s))return'go';
  if(someOk(s))return'caution';
  return'stop';
}
function statusInfo(st){
  if(st==='go')return{icon:'ti-check',label:'ひとりで乗れる',sub:'全路線で自走OK'};
  if(st==='caution')return{icon:'ti-alert-triangle',label:'路線・方面で異なる',sub:'乗る前に確認を'};
  return{icon:'ti-user-exclamation',label:'駅員さんへ',sub:'全路線でスロープ手配'};
}

function counts(){
  let c={all:STATIONS.length,go:0,caution:0,stop:0,toilet:0};
  STATIONS.forEach(s=>{
    c[statusOf(s)]++;
    if(s.hasWheelchairToilet)c.toilet++;
  });
  return c;
}

function getFiltered(){
  const q=document.getElementById("searchInput").value.trim();
  return STATIONS.filter(s=>{
    if(activeFilter==='go'&&!allOk(s))return false;
    if(activeFilter==='caution'&&statusOf(s)!=='caution')return false;
    if(activeFilter==='toilet'&&!s.hasWheelchairToilet)return false;
    if(q){
      const inName=s.stationName.includes(q);
      const inLine=s.accessibilityByLine.some(l=>l.line.includes(q));
      if(!inName&&!inLine)return false;
    }
    return true;
  });
}

function clearSearch(){
  document.getElementById("searchInput").value='';
  render();
}

function setFilter(f){
  activeFilter=f;
  openId=null;
  render();
}

function renderChips(){
  const c=counts();
  const chips=[
    {key:'all',icon:'ti-layout-grid',label:'すべて',count:c.all},
    {key:'go',icon:'ti-check',label:'ひとりで乗れる',count:c.go},
    {key:'caution',icon:'ti-alert-triangle',label:'要確認',count:c.caution},
    {key:'toilet',icon:'ti-accessible',label:'車いすトイレあり',count:c.toilet},
  ];
  document.getElementById('chips').innerHTML=chips.map(ch=>
    `<button class="chip ${activeFilter===ch.key?'active':''}" onclick="setFilter('${ch.key}')" role="tab">
      <i class="ti ${ch.icon}"></i>${ch.label}<span class="chip-count">${ch.count}</span>
    </button>`
  ).join('');
}

function render(){
  // search clear button
  const sb=document.getElementById('searchBar');
  const sv=document.getElementById('searchInput').value;
  sb.classList.toggle('has-value',!!sv);

  renderChips();

  const list=document.getElementById("stationList");
  const filtered=getFiltered();

  document.getElementById('countNum').textContent=filtered.length;
  const ctxMap={all:'すべて表示',go:'ひとりで乗れる駅',caution:'要確認の駅',toilet:'車いすトイレあり'};
  document.getElementById('countContext').textContent=sv?`「${sv}」で絞り込み`:ctxMap[activeFilter];

  if(!filtered.length){
    list.innerHTML=`<div class="empty"><i class="ti ti-search-off"></i><div class="empty-t">該当する駅が見つかりませんでした<br>検索ワードやフィルターを変えてみてください</div></div>`;
    return;
  }

  list.innerHTML=filtered.map(s=>{
    const isOpen=openId===s.id;
    const st=statusOf(s);
    const info=statusInfo(st);
    const toilet=s.hasWheelchairToilet?`<span class="toilet-pill"><i class="ti ti-accessible"></i>多機能トイレ</span>`:'';

    const chips=s.accessibilityByLine.map(l=>{
      const sc=lsc(l.line);
      const ok=l.canBoardIndependently;
      return `<span class="line-chip ${ok?'ok':'ng'}" style="background:${sc.bg};color:${sc.text};">${l.line}</span>`;
    }).join("");

    const mapQ=encodeURIComponent(s.surfaceElevator.mapQuery);
    // Primary: 場所を直接表示（最も互換性の高いURL形式・モバイルではGoogle Mapsアプリが起動）
    const mapUrl=`https://www.google.com/maps?q=${mapQ}`;
    // Secondary: 現在地から徒歩ルート（モバイル推奨・要位置情報）
    const mapDirUrl=`https://www.google.com/maps/dir/?api=1&destination=${mapQ}&travelmode=walking`;

    const rows=s.accessibilityByLine.map(l=>{
      const sc=lsc(l.line);
      const ok=l.canBoardIndependently;
      return `<div class="line-row ${ok?'ok':'ng'}">
        <span class="line-name-tag" style="background:${sc.bg};color:${sc.text};">${l.line}</span>
        <i class="ti ${ok?'ti-check':'ti-user-exclamation'} line-status-icon ${ok?'ok':'ng'}"></i>
        <div class="line-details-col">
          <div class="line-verdict ${ok?'ok':'ng'}">${ok?'ひとりで乗れます':'駅員さんに声かけ'}</div>
          <div class="line-details-text">${l.details}</div>
        </div>
      </div>`;
    }).join("");

    return `<article class="station-card ${isOpen?'open':''}" id="card-${s.id}">
      <div class="card-top" onclick="toggleCard(${s.id})">
        <div class="status-orb ${st}" aria-hidden="true"><i class="ti ${info.icon}"></i></div>
        <div class="card-main">
          <div class="station-name">${s.stationName}${toilet}</div>
          <div class="status-label ${st}">${info.label}</div>
          <div class="lines-summary">${chips}</div>
        </div>
        <div class="chevron-btn"><i class="ti ti-chevron-down"></i></div>
      </div>
      <div class="detail-panel">
        <div class="detail-inner">
          <div class="section-h"><i class="ti ti-elevator"></i>地上へのエレベーター</div>
          <div class="elevator-card">
            <div class="elev-row">
              <div class="elev-icon"><i class="ti ti-map-pin"></i></div>
              <div class="elev-text">${s.surfaceElevator.description}</div>
            </div>
            <a class="map-btn" href="${mapUrl}" target="_blank" rel="noopener" onclick="return openMap(event,'${mapUrl}')">
              <i class="ti ti-map-pin"></i>Google マップで開く
            </a>
            <div class="map-fallbacks">
              <a class="map-fallback" href="${mapDirUrl}" target="_blank" rel="noopener" onclick="return openMap(event,'${mapDirUrl}')">
                <i class="ti ti-route"></i>徒歩ルート
              </a>
              <button class="map-fallback" id="copy-${s.id}" onclick="event.stopPropagation();copyQuery(${s.id},'${s.surfaceElevator.mapQuery.replace(/'/g,"\\'")}')">
                <i class="ti ti-copy"></i><span>検索語をコピー</span>
              </button>
            </div>
          </div>

          <div class="section-h"><i class="ti ti-train"></i>路線ごとの乗りやすさ</div>
          <div class="lines-detail">${rows}</div>

          <a class="footer-link" href="${s.smoothMetroUrl}" target="_blank" rel="noopener" onclick="return openMap(event,'${s.smoothMetroUrl}')">
            <i class="ti ti-external-link"></i>スムーズメトロで詳細を確認
          </a>
        </div>
      </div>
    </article>`;
  }).join("");
}

function toggleCard(id){
  openId=openId===id?null:id;
  render();
}

// iframe / sandbox 環境でも確実に Google Maps を開くためのヘルパー
function openMap(ev,url){
  ev.stopPropagation();
  try{
    const w=window.open(url,'_blank','noopener,noreferrer');
    if(w){return false;}
  }catch(e){}
  // popup blocked — top window に navigate
  try{
    if(window.top&&window.top!==window.self){
      window.top.location.href=url;
      ev.preventDefault();
      return false;
    }
  }catch(e){}
  // それでもダメなら href のデフォルト挙動に任せる
  return true;
}

async function copyQuery(id,q){
  try{
    if(navigator.clipboard&&navigator.clipboard.writeText){
      await navigator.clipboard.writeText(q);
    }else{
      const ta=document.createElement('textarea');
      ta.value=q;ta.style.position='fixed';ta.style.opacity='0';
      document.body.appendChild(ta);ta.select();
      document.execCommand('copy');document.body.removeChild(ta);
    }
    const btn=document.getElementById('copy-'+id);
    if(btn){
      btn.classList.add('copied');
      const span=btn.querySelector('span');
      const icon=btn.querySelector('i');
      const orig=span.textContent;
      span.textContent='コピーしました';
      icon.className='ti ti-check';
      setTimeout(()=>{
        btn.classList.remove('copied');
        span.textContent=orig;
        icon.className='ti ti-copy';
      },2000);
    }
  }catch(e){
    alert('コピーに失敗しました：'+q);
  }
}

render();
