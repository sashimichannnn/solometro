<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>solometro — ひとりで乗れる東京メトロ駅案内</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F2EEF8;
  --bg-2:#EAE4F2;
  --surface:#FFFFFF;
  --ink:#0F0E14;
  --ink-2:#4A4856;
  --ink-3:#8A87A0;
  --line:#E3DEEC;
  --line-2:#CFC8DC;
  --go:#3FB66B;
  --go-bg:#C7F0CE;
  --go-ink:#0F4F2A;
  --caution:#F49D3D;
  --caution-bg:#FFD9B0;
  --caution-ink:#7A4806;
  --stop:#F26865;
  --stop-bg:#FFC8C6;
  --stop-ink:#7A1B1A;
  --accent:#7C5BE0;
  --accent-bg:#E3D7FB;
  --lavender:#D9C8F5;
  --mint:#B8EBC4;
  --peach:#FFD0A8;
  --coral:#FFBABA;
  --sky:#B8DEF5;
  --radius-card:24px;
  --radius-pill:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{font-family:'Inter','Noto Sans JP',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--ink);font-feature-settings:'palt','calt';-webkit-font-smoothing:antialiased;}
body{padding:22px 14px 80px;line-height:1.55;}
.app{max-width:680px;margin:0 auto;}

/* ---------- HEADER ---------- */
.header{margin-bottom:18px;text-align:center;}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:8px;justify-content:center;}
.brand-mark{width:42px;height:42px;border-radius:12px;background:var(--lavender);color:var(--ink);display:flex;align-items:center;justify-content:center;flex-shrink:0;border:2px solid var(--ink);padding:4px;}
.brand-mark svg{width:100%;height:100%;display:block;}
.brand-wordmark{font-family:'Inter',sans-serif;font-size:24px;font-weight:800;letter-spacing:-.03em;color:var(--ink);line-height:1;}
.brand-wordmark .dot{color:var(--accent);}
.header h1{font-size:18px;font-weight:800;letter-spacing:-.015em;line-height:1.35;color:var(--ink);margin-bottom:3px;}
.header .meta{font-size:11.5px;color:var(--ink-3);letter-spacing:.01em;}
.header .meta a{color:var(--accent);text-decoration:none;font-weight:500;}
.header .meta .sep{margin:0 6px;color:var(--line-2);}

/* ---------- CRITERIA HERO ---------- */
.criteria-hero{background:var(--mint);border:2px solid var(--ink);color:var(--ink);border-radius:24px;padding:20px 22px;margin-bottom:12px;position:relative;overflow:hidden;}
.criteria-hero-eyebrow{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:800;color:var(--go-ink);letter-spacing:.14em;text-transform:uppercase;font-family:'Inter',sans-serif;margin-bottom:10px;background:#fff;padding:4px 9px;border-radius:999px;border:1.5px solid var(--ink);}
.criteria-hero-eyebrow i{font-size:12px;}
.criteria-hero-title{font-size:18px;font-weight:800;line-height:1.4;letter-spacing:-.015em;margin-bottom:14px;color:var(--ink);}
.criteria-hero-title .hi{color:var(--ink);font-weight:900;}
.criteria-metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.metric{background:#fff;border:2px solid var(--ink);border-radius:14px;padding:11px 13px;}
.metric-label{font-size:11px;color:var(--ink-2);font-weight:700;letter-spacing:.04em;display:flex;align-items:center;gap:5px;margin-bottom:4px;}
.metric-label i{font-size:12px;}
.metric-value{font-size:26px;font-weight:900;letter-spacing:-.03em;font-family:'Inter','Noto Sans JP',sans-serif;line-height:1;color:var(--ink);}
.metric-value .unit{font-size:13px;font-weight:700;color:var(--ink-2);margin-left:3px;letter-spacing:0;}
.metric-value .op{font-size:15px;font-weight:700;color:var(--ink-2);margin-right:4px;}
.criteria-hero-footnote{font-size:11px;color:var(--ink-2);line-height:1.55;display:flex;align-items:flex-start;gap:6px;font-weight:500;}
.criteria-hero-footnote i{font-size:12px;color:var(--ink-2);flex-shrink:0;margin-top:1px;}

/* ---------- LEGEND ---------- */
.legend{background:var(--surface);border:2px solid var(--ink);border-radius:24px;padding:16px 18px;margin-bottom:12px;}
.legend-title{display:flex;align-items:center;gap:6px;font-size:10.5px;font-weight:800;color:var(--ink);letter-spacing:.14em;margin-bottom:12px;text-transform:uppercase;font-family:'Inter',sans-serif;}
.legend-title i{font-size:13px;}
.legend-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.legend-item{display:flex;flex-direction:column;align-items:flex-start;gap:7px;padding:6px 4px 4px;}
.legend-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--ink);flex-shrink:0;border:2px solid var(--ink);}
.legend-dot i{font-size:16px;}
.legend-item .lt{font-size:12.5px;font-weight:800;color:var(--ink);letter-spacing:-.01em;}
.legend-item .ls{font-size:10.5px;color:var(--ink-2);line-height:1.4;font-weight:500;}
.dot-go{background:var(--mint);}
.dot-caution{background:var(--peach);}
.dot-stop{background:var(--coral);}
.criteria-note{margin-top:14px;padding-top:12px;border-top:1px dashed var(--line);display:flex;align-items:flex-start;gap:8px;font-size:11.5px;color:var(--ink-2);line-height:1.55;}
.criteria-note i{color:var(--accent);font-size:14px;flex-shrink:0;margin-top:1px;}
.criteria-note strong{color:var(--ink);font-weight:700;font-family:'Inter','Noto Sans JP',sans-serif;}

/* ---------- DOOR DIAGRAM ---------- */
.direction-block{margin-top:10px;background:#FAF8F1;border:1px solid var(--line);border-radius:10px;padding:10px 12px;}
.direction-block + .direction-block{margin-top:8px;}
.direction-name{font-size:12px;font-weight:700;color:var(--ink);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.direction-name i{font-size:12px;color:var(--ink-3);}
.car-grid{display:flex;gap:6px;flex-wrap:wrap;}
.car-cell{display:flex;flex-direction:column;align-items:center;gap:3px;}
.car-num{font-size:10px;font-weight:700;color:#fff;background:#2C4D7A;border-radius:3px;padding:2px 6px;line-height:1;min-width:22px;text-align:center;position:relative;}
.car-num.ev::after{content:'';position:absolute;right:-6px;top:-3px;width:11px;height:11px;border-radius:50%;background:#FFC107;border:1.5px solid #fff;}
.doors{display:flex;gap:2px;}
.door{width:11px;height:11px;border:1px solid #B5B0A2;border-radius:1px;background:#fff;position:relative;}
.door.ok{background:var(--go);border-color:#0B5A41;}
.door.improved::before{content:'';position:absolute;top:-1px;right:-1px;width:0;height:0;border-style:solid;border-width:0 6px 6px 0;border-color:transparent var(--stop) transparent transparent;}
.direction-summary{font-size:11.5px;color:var(--ink-2);margin-top:8px;line-height:1.55;}
.direction-summary strong{color:var(--go-ink);font-weight:700;}
.direction-summary .ng{color:var(--stop-ink);font-weight:700;}
.door-legend{display:flex;flex-wrap:wrap;gap:10px;font-size:10px;color:var(--ink-3);margin-top:8px;padding-top:8px;border-top:1px dashed var(--line);}
.door-legend span{display:inline-flex;align-items:center;gap:4px;}
.door-legend .dm{width:10px;height:10px;border:1px solid #B5B0A2;border-radius:1px;display:inline-block;}
.door-legend .dm.ok{background:var(--go);border-color:#0B5A41;}
.door-legend .dm.imp{position:relative;}
.door-legend .dm.imp::before{content:'';position:absolute;top:-1px;right:-1px;width:0;height:0;border-style:solid;border-width:0 5px 5px 0;border-color:transparent var(--stop) transparent transparent;}
.door-legend .dm.evd{background:#FFC107;border-color:#FFC107;border-radius:50%;}
.unverified-note{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--ink-3);background:#F0EBDD;padding:2px 7px;border-radius:999px;margin-top:6px;}
.unverified-note i{font-size:11px;}
.verified-pill{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;color:#fff;background:var(--accent);padding:2px 7px;border-radius:999px;margin-left:6px;vertical-align:1px;letter-spacing:.02em;}
.verified-pill i{font-size:10px;}

/* ---------- OUTAGE ---------- */
.outage-pill{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;color:#fff;background:var(--stop);padding:2px 8px;border-radius:999px;}
.outage-pill i{font-size:11px;}
.outage-card{background:#FEF4F3;border:1px solid #F4C2C1;border-left:4px solid var(--stop);border-radius:12px;padding:12px 14px;margin-bottom:14px;}
.outage-h{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:var(--stop-ink);margin-bottom:8px;}
.outage-h i{font-size:16px;color:var(--stop);}
.outage-list{display:flex;flex-direction:column;gap:8px;}
.outage-item{background:#fff;border:1px solid #F4C2C1;border-radius:8px;padding:9px 11px;font-size:12.5px;line-height:1.55;}
.outage-row{display:flex;gap:6px;align-items:flex-start;}
.outage-row + .outage-row{margin-top:3px;}
.outage-lbl{color:var(--ink-3);font-weight:700;font-size:11px;min-width:42px;flex-shrink:0;margin-top:2px;letter-spacing:.04em;}
.outage-val{flex:1;color:var(--ink);}
.outage-type-badge{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:999px;margin-right:6px;}
.outage-type-badge.kyushi{background:var(--stop);color:#fff;}
.outage-type-badge.tenken{background:var(--caution);color:#fff;}
.outage-updated{font-size:10px;color:var(--ink-3);margin-top:8px;display:flex;align-items:center;gap:4px;}
.outage-updated i{font-size:11px;}
.outage-source{color:var(--accent);text-decoration:none;}

/* ---------- FLOATING BUTTONS ---------- */
.fab-stack{position:fixed;right:18px;bottom:20px;display:flex;flex-direction:column;gap:10px;z-index:50;pointer-events:none;}
.fab{pointer-events:auto;width:56px;height:56px;border-radius:50%;border:2px solid var(--ink);background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:3px 3px 0 var(--ink);cursor:pointer;transition:transform .12s,box-shadow .12s;font-family:inherit;}
.fab:hover{transform:translate(-2px,-2px);box-shadow:5px 5px 0 var(--ink);}
.fab:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--ink);}
.fab i{font-size:22px;}
.fab.search{background:var(--lavender);color:var(--ink);}
.fab.search:hover{background:var(--lavender);}
.fab.hidden{display:none;}
@media (max-width:480px){
  .fab-stack{right:14px;bottom:16px;}
  .fab{width:50px;height:50px;}
  .fab i{font-size:20px;}
}

/* ---------- SEARCH ---------- */
.search-bar{background:var(--surface);border:2px solid var(--ink);border-radius:16px;padding:13px 15px;display:flex;align-items:center;gap:10px;margin-bottom:10px;transition:transform .12s;}
.search-bar:focus-within{transform:translate(-2px,-2px);box-shadow:4px 4px 0 var(--ink);}
.search-bar i{font-size:18px;color:var(--ink);flex-shrink:0;}
.search-bar input{border:none;background:transparent;font-size:15px;color:var(--ink);flex:1;outline:none;font-family:inherit;letter-spacing:-.005em;font-weight:500;}
.search-bar input::placeholder{color:var(--ink-3);font-weight:400;}
.clear-btn{background:var(--lavender);border:1.5px solid var(--ink);cursor:pointer;color:var(--ink);width:24px;height:24px;border-radius:50%;display:none;align-items:center;justify-content:center;flex-shrink:0;}
.clear-btn i{font-size:13px;}
.search-bar.has-value .clear-btn{display:flex;}

/* ---------- FILTER CHIPS ---------- */
.chips{display:flex;gap:7px;overflow-x:auto;padding:2px 0 6px;margin:0 -14px 6px;padding-left:14px;padding-right:14px;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:2px solid var(--ink);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:700;color:var(--ink);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:transform .12s,box-shadow .12s,background .15s;font-family:inherit;letter-spacing:-.005em;}
.chip:hover{transform:translate(-1px,-1px);box-shadow:2px 2px 0 var(--ink);}
.chip.active{background:var(--ink);color:#fff;}
.chip .chip-count{font-size:11px;font-weight:800;background:rgba(0,0,0,.07);color:var(--ink-2);padding:1px 7px;border-radius:999px;font-family:'Inter',sans-serif;}
.chip.active .chip-count{background:rgba(255,255,255,.22);color:#fff;}
.chip i{font-size:14px;}

/* ---------- COUNT ---------- */
.count-row{display:flex;align-items:center;justify-content:space-between;font-size:11.5px;color:var(--ink-3);padding:6px 4px 12px;letter-spacing:.01em;font-weight:500;}
.count-row strong{color:var(--ink);font-weight:800;font-size:14px;font-family:'Inter',sans-serif;margin-right:2px;}

/* ---------- CARD ---------- */
.station-card{background:var(--surface);border:2px solid var(--ink);border-radius:22px;margin-bottom:10px;overflow:hidden;transition:transform .15s,box-shadow .15s;}
.station-card:hover{transform:translate(-2px,-2px);box-shadow:4px 4px 0 var(--ink);}
.station-card.open{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--ink);}
.card-top{padding:16px;cursor:pointer;display:flex;align-items:center;gap:14px;min-height:74px;}

/* Big status indicator */
.status-orb{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--ink);flex-shrink:0;position:relative;border:2px solid var(--ink);}
.status-orb i{font-size:24px;}
.status-orb.go{background:var(--mint);}
.status-orb.caution{background:var(--peach);}
.status-orb.stop{background:var(--coral);}
.status-orb::after{display:none;}

.card-main{flex:1;min-width:0;}
.station-name{font-size:19px;font-weight:800;letter-spacing:-.02em;display:flex;align-items:center;gap:8px;flex-wrap:wrap;color:var(--ink);}
.toilet-pill{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:800;color:var(--go-ink);background:var(--mint);padding:3px 9px;border-radius:999px;letter-spacing:.01em;border:1.5px solid var(--ink);}
.toilet-pill i{font-size:11px;}
.status-label{font-size:13px;font-weight:700;margin-top:4px;letter-spacing:-.005em;color:var(--ink);}
.status-label.go,.status-label.caution,.status-label.stop{color:var(--ink);}

.lines-summary{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px;}
.line-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:800;padding:3px 10px 3px 8px;border-radius:999px;letter-spacing:-.005em;border:1.5px solid var(--ink);}
.line-chip::before{content:'';width:7px;height:7px;border-radius:50%;border:1px solid var(--ink);}
.line-chip.ok::before{background:var(--go);}
.line-chip.ng::before{background:var(--stop);}

.chevron-btn{flex-shrink:0;width:32px;height:32px;border-radius:50%;background:var(--lavender);color:var(--ink);display:flex;align-items:center;justify-content:center;transition:transform .25s,background .15s;border:2px solid var(--ink);}
.chevron-btn i{font-size:16px;}
.station-card.open .chevron-btn{transform:rotate(180deg);background:var(--ink);color:#fff;}

/* ---------- DETAIL PANEL ---------- */
.detail-panel{max-height:0;overflow:hidden;transition:max-height .35s ease;}
.station-card.open .detail-panel{max-height:2000px;}
.detail-inner{padding:0 16px 18px;border-top:1px dashed var(--line);margin-top:0;padding-top:16px;}

.section-h{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;color:var(--ink-3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;}
.section-h i{font-size:13px;}

/* ---------- ELEVATOR MAP ---------- */
.map-preview{display:block;margin-bottom:12px;border-radius:14px;overflow:hidden;border:2px solid var(--ink);background:linear-gradient(135deg,#E3D7FB 0%,#C7F0CE 100%);position:relative;aspect-ratio:16/9;text-decoration:none;color:var(--ink);transition:transform .12s,box-shadow .12s;cursor:pointer;}
.map-preview:hover{transform:translate(-2px,-2px);box-shadow:4px 4px 0 var(--ink);}
.map-preview-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(15,14,20,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(15,14,20,.08) 1px,transparent 1px);background-size:24px 24px;}
.map-preview-roads{position:absolute;inset:0;}
.map-preview-pin{position:absolute;top:50%;left:50%;transform:translate(-50%,-100%);}
.map-preview-pin-circle{width:36px;height:36px;background:var(--stop);border:2.5px solid var(--ink);border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;}
.map-preview-pin-circle i{transform:rotate(45deg);color:#fff;font-size:18px;}
.map-preview-pin-shadow{position:absolute;left:50%;top:36px;width:18px;height:5px;background:rgba(15,14,20,.3);border-radius:50%;transform:translateX(-50%);filter:blur(1px);}
.map-preview-overlay{position:absolute;top:10px;left:10px;background:#fff;border:1.5px solid var(--ink);border-radius:999px;padding:4px 11px;font-size:10.5px;font-weight:800;color:var(--ink);display:inline-flex;align-items:center;gap:4px;letter-spacing:.02em;white-space:nowrap;}
.map-preview-overlay i{font-size:11px;}
.map-preview-cta{position:absolute;bottom:10px;right:10px;background:var(--ink);color:#fff;border-radius:999px;padding:5px 11px;font-size:10.5px;font-weight:800;display:inline-flex;align-items:center;gap:4px;letter-spacing:.02em;}
.map-preview-cta i{font-size:11px;}

.elevator-card{background:var(--lavender);border:2px solid var(--ink);border-radius:18px;padding:14px;margin-bottom:18px;}
.elev-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px;}
.elev-icon{width:36px;height:36px;border-radius:10px;background:#fff;color:var(--ink);display:flex;align-items:center;justify-content:center;flex-shrink:0;border:2px solid var(--ink);}
.elev-icon i{font-size:18px;}
.elev-text{font-size:13.5px;line-height:1.5;flex:1;font-weight:600;color:var(--ink);}
.map-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--ink);color:#fff;border:2px solid var(--ink);border-radius:14px;padding:13px 16px;font-size:13.5px;font-weight:800;cursor:pointer;text-decoration:none;width:100%;font-family:inherit;transition:transform .1s,box-shadow .1s;}
.map-btn:hover{transform:translate(-2px,-2px);box-shadow:4px 4px 0 var(--ink);}
.map-btn:active{transform:scale(.98);}
.map-btn i{font-size:17px;}
.map-btn-sub{background:#fff;color:var(--ink);margin-top:8px;}
.map-btn-sub:hover{background:var(--bg-2);}

.map-fallbacks{display:flex;gap:8px;margin-top:10px;}
.map-fallback{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:5px;background:#fff;color:var(--ink);border:2px solid var(--ink);border-radius:12px;padding:9px 8px;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;font-family:inherit;transition:transform .1s,box-shadow .1s;}
.map-fallback:hover{transform:translate(-1px,-1px);box-shadow:2px 2px 0 var(--ink);}
.map-fallback i{font-size:14px;}
.map-fallback.copied{background:var(--mint);color:var(--go-ink);}
.map-fallback.copied i{color:var(--go-ink);}

.lines-detail{display:flex;flex-direction:column;gap:8px;}
.line-row{display:flex;align-items:flex-start;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px;}
.line-row.ok{border-left:3px solid var(--go);}
.line-row.ng{border-left:3px solid var(--stop);}
.line-name-tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;flex-shrink:0;margin-top:1px;white-space:nowrap;}
.line-status-icon{font-size:20px;flex-shrink:0;margin-top:0;}
.line-status-icon.ok{color:var(--go);}
.line-status-icon.ng{color:var(--stop);}
.line-details-col{flex:1;min-width:0;}
.line-verdict{font-size:13px;font-weight:700;margin-bottom:3px;}
.line-verdict.ok{color:var(--go-ink);}
.line-verdict.ng{color:var(--stop-ink);}
.line-details-text{font-size:12px;color:var(--ink-2);line-height:1.55;}

.footer-link{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:var(--accent);text-decoration:none;margin-top:14px;font-weight:500;}
.footer-link i{font-size:12px;}

/* ---------- EMPTY ---------- */
.empty{text-align:center;padding:40px 20px;color:var(--ink-3);background:var(--surface);border:1px dashed var(--line-2);border-radius:16px;}
.empty i{font-size:40px;color:var(--line-2);display:block;margin-bottom:12px;}
.empty-t{font-size:14px;color:var(--ink-2);font-weight:500;}

/* ---------- HELP TIP ---------- */

let openId=null;
let activeFilter='go'; // all | go | caution | toilet  (デフォルト「ひとりで乗れる」)
let OUTAGES_BY_STATION={}; // 駅名 → [outage, ...]
let OUTAGES_META={updatedAtJst:null,dataAsOf:null,source:null};

async function loadOutages(){
  try{
    const res=await fetch('data/elevator_outages.json',{cache:'no-store'});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    OUTAGES_META={
      updatedAtJst:data.updatedAtJst||data.updatedAt||null,
      dataAsOf:data.dataAsOf||null,
      source:data.source||null,
    };
    const map={};
    (data.outages||[]).forEach(o=>{
      const k=(o.stationName||'').replace(/駅$/,'');
      if(!k)return;
      (map[k]=map[k]||[]).push(o);
    });
    OUTAGES_BY_STATION=map;
    render();
  }catch(e){
    console.warn('outage data load failed:',e);
  }
}

function allOk(s){return s.accessibilityByLine.every(l=>l.canBoardIndependently);}
function someOk(s){return s.accessibilityByLine.some(l=>l.canBoardIndependently);}
function statusOf(s){
  if(allOk(s))return'go';
  if(someOk(s))return'caution';
  return'stop';
}
function statusInfo(st){
  if(st==='go')return{icon:'ti-check',label:'ひとりで乗れる',sub:'全路線で自走OK'};
  if(st==='caution')return{icon:'ti-alert-triangle',label:'路線・方面で異なる',sub:'乗る前に確認を'};
  return{icon:'ti-user-exclamation',label:'駅員さんへ',sub:'全路線でスロープ手配'};
}

function counts(){
  let c={all:STATIONS.length,go:0,caution:0,stop:0,toilet:0};
  STATIONS.forEach(s=>{
    c[statusOf(s)]++;
    if(s.hasWheelchairToilet)c.toilet++;
  });
  return c;
}

function getFiltered(){
  const q=document.getElementById("searchInput").value.trim();
  return STATIONS.filter(s=>{
    if(activeFilter==='go'&&!allOk(s))return false;
    if(activeFilter==='caution'&&statusOf(s)!=='caution')return false;
    if(activeFilter==='toilet'&&!s.hasWheelchairToilet)return false;
    if(q){
      const inName=s.stationName.includes(q);
      const inLine=s.accessibilityByLine.some(l=>l.line.includes(q));
      if(!inName&&!inLine)return false;
    }
    return true;
  });
}

function clearSearch(){
  document.getElementById("searchInput").value='';
  render();
}

function setFilter(f){
  activeFilter=f;
  openId=null;
  render();
}

function renderChips(){
  const c=counts();
  const chips=[
    {key:'all',icon:'ti-layout-grid',label:'すべて',count:c.all},
    {key:'go',icon:'ti-check',label:'ひとりで乗れる',count:c.go},
    {key:'caution',icon:'ti-alert-triangle',label:'要確認',count:c.caution},
    {key:'toilet',icon:'ti-accessible',label:'車いすトイレあり',count:c.toilet},
  ];
  document.getElementById('chips').innerHTML=chips.map(ch=>
    `<button class="chip ${activeFilter===ch.key?'active':''}" onclick="setFilter('${ch.key}')" role="tab">
      <i class="ti ${ch.icon}"></i>${ch.label}<span class="chip-count">${ch.count}</span>
    </button>`
  ).join('');
}

function render(){
  // search clear button
  const sb=document.getElementById('searchBar');
  const sv=document.getElementById('searchInput').value;
  sb.classList.toggle('has-value',!!sv);

  renderChips();

  const list=document.getElementById("stationList");
  const filtered=getFiltered();

  document.getElementById('countNum').textContent=filtered.length;
  const ctxMap={all:'すべて表示',go:'ひとりで乗れる駅',caution:'要確認の駅',toilet:'車いすトイレあり'};
  document.getElementById('countContext').textContent=sv?`「${sv}」で絞り込み`:ctxMap[activeFilter];

  if(!filtered.length){
    list.innerHTML=`<div class="empty"><i class="ti ti-search-off"></i><div class="empty-t">該当する駅が見つかりませんでした<br>検索ワードやフィルターを変えてみてください</div></div>`;
    return;
  }

  list.innerHTML=filtered.map(s=>{
    const isOpen=openId===s.id;
    const st=statusOf(s);
    const info=statusInfo(st);
    const toilet=s.hasWheelchairToilet?`<span class="toilet-pill"><i class="ti ti-accessible"></i>多機能トイレ</span>`:'';
    const stationKey=s.stationName.replace(/駅$/,'');
    const outages=OUTAGES_BY_STATION[stationKey]||[];
    const outagePill=outages.length?`<span class="outage-pill"><i class="ti ti-alert-octagon"></i>EV停止 ${outages.length}件</span>`:'';

    const chips=s.accessibilityByLine.map(l=>{
      const sc=lsc(l.line);
      const ok=l.canBoardIndependently;
      return `<span class="line-chip ${ok?'ok':'ng'}" style="background:${sc.bg};color:${sc.text};">${l.line}</span>`;
    }).join("");

    const mapQ=encodeURIComponent(s.surfaceElevator.mapQuery);
    // Primary: 場所を直接表示（最も互換性の高いURL形式・モバイルではGoogle Mapsアプリが起動）
    const mapUrl=`https://www.google.com/maps?q=${mapQ}`;
    // Secondary: 現在地から徒歩ルート（モバイル推奨・要位置情報）
    const mapDirUrl=`https://www.google.com/maps/dir/?api=1&destination=${mapQ}&travelmode=walking`;

    const rows=s.accessibilityByLine.map(l=>{
      const sc=lsc(l.line);
      const ok=l.canBoardIndependently;
      const directionsHtml=l.verified&&l.directions?renderDirections(l):'';
      const verifiedBadge=l.verified?'<span class="verified-pill"><i class="ti ti-circle-check"></i>PDF照合済</span>':'';
      return `<div class="line-row ${ok?'ok':'ng'}">
        <span class="line-name-tag" style="background:${sc.bg};color:${sc.text};">${l.line}</span>
        <i class="ti ${ok?'ti-check':'ti-user-exclamation'} line-status-icon ${ok?'ok':'ng'}"></i>
        <div class="line-details-col">
          <div class="line-verdict ${ok?'ok':'ng'}">${ok?'ひとりで乗れます':'駅員さんに声かけ'}${verifiedBadge}</div>
          <div class="line-details-text">${l.details}</div>
          ${directionsHtml}
        </div>
      </div>`;
    }).join("");

    return `<article class="station-card ${isOpen?'open':''}" id="card-${s.id}">
      <div class="card-top" onclick="toggleCard(${s.id})">
        <div class="status-orb ${st}" aria-hidden="true"><i class="ti ${info.icon}"></i></div>
        <div class="card-main">
          <div class="station-name">${s.stationName}${toilet}${outagePill}</div>
          <div class="status-label ${st}">${info.label}</div>
          <div class="lines-summary">${chips}</div>
        </div>
        <div class="chevron-btn"><i class="ti ti-chevron-down"></i></div>
      </div>
      <div class="detail-panel">
        <div class="detail-inner">
          ${outages.length?renderOutages(outages):''}
          <div class="section-h"><i class="ti ti-elevator"></i>地上へのエレベーター</div>
          <div class="elevator-card">
            <a class="map-preview" href="${mapUrl}" target="_blank" rel="noopener" onclick="return openMap(event,'${mapUrl}')" aria-label="Googleマップで開く">
              <div class="map-preview-grid"></div>
              <svg class="map-preview-roads" viewBox="0 0 320 180" preserveAspectRatio="none">
                <path d="M0 60 Q80 50 160 90 T320 110" stroke="rgba(15,14,20,.18)" stroke-width="7" fill="none" stroke-linecap="round"/>
                <path d="M50 0 L70 60 L60 120 L90 180" stroke="rgba(15,14,20,.14)" stroke-width="5" fill="none" stroke-linecap="round"/>
                <path d="M260 0 L240 80 L270 180" stroke="rgba(15,14,20,.14)" stroke-width="5" fill="none" stroke-linecap="round"/>
              </svg>
              <div class="map-preview-pin">
                <div class="map-preview-pin-circle"><i class="ti ti-elevator"></i></div>
                <div class="map-preview-pin-shadow"></div>
              </div>
              <div class="map-preview-overlay"><i class="ti ti-map-pin"></i>EV位置</div>
              <div class="map-preview-cta"><i class="ti ti-external-link"></i>マップで開く</div>
            </a>
            <div class="elev-row">
              <div class="elev-icon"><i class="ti ti-map-pin"></i></div>
              <div class="elev-text">${s.surfaceElevator.description}</div>
            </div>
            <a class="map-btn" href="${mapUrl}" target="_blank" rel="noopener" onclick="return openMap(event,'${mapUrl}')">
              <i class="ti ti-map-pin"></i>Google マップで開く
            </a>
            <div class="map-fallbacks">
              <a class="map-fallback" href="${mapDirUrl}" target="_blank" rel="noopener" onclick="return openMap(event,'${mapDirUrl}')">
                <i class="ti ti-route"></i>徒歩ルート
              </a>
              <button class="map-fallback" id="copy-${s.id}" onclick="event.stopPropagation();copyQuery(${s.id},'${s.surfaceElevator.mapQuery.replace(/'/g,"\\'")}')">
                <i class="ti ti-copy"></i><span>検索語をコピー</span>
              </button>
            </div>
          </div>

          <div class="section-h"><i class="ti ti-train"></i>路線ごとの乗りやすさ</div>
          <div class="lines-detail">${rows}</div>

          <a class="footer-link" href="${s.smoothMetroUrl}" target="_blank" rel="noopener" onclick="return openMap(event,'${s.smoothMetroUrl}')">
            <i class="ti ti-external-link"></i>スムーズメトロで詳細を確認
          </a>
        </div>
      </div>
    </article>`;
  }).join("");
}

function toggleCard(id){
  openId=openId===id?null:id;
  render();
}

function renderOutages(outages){
  const items=outages.map(o=>{
    const t=(o.type||'').trim();
    const badge=t==='休止'?'<span class="outage-type-badge kyushi">休止</span>':
                t==='点検'?'<span class="outage-type-badge tenken">点検</span>':'';
    const lineTag=o.line?`<span style="font-size:10px;font-weight:700;color:var(--ink-3);margin-right:6px;">${o.line}</span>`:'';
    return `<div class="outage-item">
      ${badge}${lineTag}
      <div class="outage-row"><span class="outage-lbl">設備</span><span class="outage-val">${o.facility||'(エレベーター)'}</span></div>
      ${o.period?`<div class="outage-row"><span class="outage-lbl">期間</span><span class="outage-val">${o.period}</span></div>`:''}
      ${o.reason?`<div class="outage-row"><span class="outage-lbl">理由</span><span class="outage-val" style="color:var(--ink-2);">${o.reason}</span></div>`:''}
    </div>`;
  }).join('');
  const updated=OUTAGES_META.updatedAtJst?` 更新：${OUTAGES_META.updatedAtJst}`:'';
  const src=OUTAGES_META.source?` ／ <a class="outage-source" href="${OUTAGES_META.source}" target="_blank" rel="noopener">出典：東京メトロ公式</a>`:'';
  return `<div class="outage-card">
    <div class="outage-h"><i class="ti ti-alert-octagon"></i>エレベーター運転停止情報</div>
    <div class="outage-list">${items}</div>
    <div class="outage-updated"><i class="ti ti-refresh"></i>${updated}${src}</div>
  </div>`;
}

function renderDirections(l){
  const dpc=l.doorsPerCar||3;
  const total=l.totalCars||6;
  const dirs=l.directions.map(d=>{
    const okMap={};
    d.okDoors.forEach(od=>{
      okMap[od.car]=okMap[od.car]||{};
      okMap[od.car][od.door]={ok:true,improved:!!od.improved};
    });
    const ev=new Set(d.evCars||l.evCars||[]);
    const cars=[];
    for(let c=1;c<=total;c++){
      const doors=[];
      for(let dr=1;dr<=dpc;dr++){
        const state=okMap[c]&&okMap[c][dr];
        const cls=['door'];
        if(state&&state.ok)cls.push('ok');
        if(state&&state.improved)cls.push('improved');
        doors.push(`<span class="${cls.join(' ')}" title="${c}号車${dr}番扉"></span>`);
      }
      const evCls=ev.has(c)?'car-num ev':'car-num';
      cars.push(`<div class="car-cell"><span class="${evCls}">${c}</span><div class="doors">${doors.join('')}</div></div>`);
    }
    let summary;
    if(d.okDoors.length===0){
      summary=`<span class="ng">基準クリアのドアなし／係員手配が必要</span>`;
    }else{
      const parts=d.okDoors.map(od=>`<strong>${od.car}号車${od.door}番扉</strong>${od.improved?'<span style="font-size:10px;color:#7A1B1A;">(対策実施)</span>':''}`);
      summary=`${parts.join('、')}が基準クリア`;
    }
    const evList=d.evCars||l.evCars||[];
    const evText=evList.length?`<span style="color:#7A4806;">🛗EV近接：${evList.join('・')}号車</span>`:'';
    const track=d.track?`<span style="color:var(--ink-3);font-weight:500;">（${d.track}）</span>`:'';
    return `<div class="direction-block">
      <div class="direction-name"><i class="ti ti-arrow-narrow-right"></i>${d.name}${track}${evText?' '+evText:''}</div>
      <div class="car-grid">${cars.join('')}</div>
      <div class="direction-summary">${summary}</div>
    </div>`;
  }).join('');
  return `<div class="directions-wrap">${dirs}
    <div class="door-legend">
      <span><span class="dm"></span>未達</span>
      <span><span class="dm ok"></span>基準クリア</span>
      <span><span class="dm ok improved"></span>対策実施</span>
      <span><span class="dm evd"></span>EV近接</span>
    </div>
  </div>`;
}

// 確実に新タブで Google Maps を開くヘルパー（フォールバックは行わない）
function openMap(ev,url){
  ev.stopPropagation();
  try{
    window.open(url,'_blank','noopener,noreferrer');
  }catch(e){}
  ev.preventDefault();
  return false;
}

async function copyQuery(id,q){
  try{
    if(navigator.clipboard&&navigator.clipboard.writeText){
      await navigator.clipboard.writeText(q);
    }else{
      const ta=document.createElement('textarea');
      ta.value=q;ta.style.position='fixed';ta.style.opacity='0';
      document.body.appendChild(ta);ta.select();
      document.execCommand('copy');document.body.removeChild(ta);
    }
    const btn=document.getElementById('copy-'+id);
    if(btn){
      btn.classList.add('copied');
      const span=btn.querySelector('span');
      const icon=btn.querySelector('i');
      const orig=span.textContent;
      span.textContent='コピーしました';
      icon.className='ti ti-check';
      setTimeout(()=>{
        btn.classList.remove('copied');
        span.textContent=orig;
        icon.className='ti ti-copy';
      },2000);
    }
  }catch(e){
    alert('コピーに失敗しました：'+q);
  }
}

render();
loadOutages();

// ----- FLOATING BUTTONS -----
function scrollToTop(){
  window.scrollTo({top:0,behavior:'smooth'});
}
function jumpToSearch(){
  const inp=document.getElementById('searchInput');
  if(!inp)return;
  // ヘッダーが見えるところまでスクロール
  window.scrollTo({top:0,behavior:'smooth'});
  setTimeout(()=>{inp.focus();inp.select&&inp.select();},350);
}
function updateFabs(){
  const y=window.scrollY||document.documentElement.scrollTop;
  const top=document.getElementById('fabTop');
  // 一番上にいるときは「↑」を隠す。検索ボタンは常時表示。
  if(top)top.classList.toggle('hidden',y<200);
}
window.addEventListener('scroll',updateFabs,{passive:true});
updateFabs();
</script>
