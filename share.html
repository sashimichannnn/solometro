<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>solometro — ルート読み込み中</title>
<link rel="manifest" href="/solometro/manifest.json">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body {
    font-family: 'Inter', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #F2EEF8;
    color: #0F0E14;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    text-align: center;
    line-height: 1.55;
  }
  .card {
    background: #fff;
    border-radius: 24px;
    padding: 32px 24px;
    max-width: 360px;
    width: 100%;
    border: 1.5px solid #E3DEEC;
    box-shadow: 0 4px 18px rgba(15,14,20,.06);
  }
  .logo {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -.03em;
    margin-bottom: 18px;
  }
  .logo .dot { color: #7C5BE0; }
  .status {
    font-size: 14px;
    color: #4A4856;
    line-height: 1.6;
  }
  .stations {
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: center;
    margin: 18px 0 8px;
    font-size: 18px;
    font-weight: 800;
    flex-wrap: wrap;
  }
  .arrow { color: #7C5BE0; font-size: 22px; }
  .source {
    font-size: 11px;
    color: #8A87A0;
    margin-bottom: 18px;
    letter-spacing: .04em;
  }
  .error {
    font-size: 13px;
    color: #7A1B1A;
    background: #FFE7E6;
    border: 1.5px dashed #C44;
    border-radius: 12px;
    padding: 12px 14px;
    margin: 14px 0 4px;
    line-height: 1.55;
    text-align: left;
  }
  .error strong { color: #7A1B1A; }
  .raw {
    font-size: 11px;
    color: #8A87A0;
    background: #F5F4F0;
    border-radius: 8px;
    padding: 8px 10px;
    margin-top: 8px;
    word-break: break-all;
    text-align: left;
    max-height: 80px;
    overflow: auto;
  }
  .back-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 16px;
    padding: 12px 26px;
    background: #0F0E14;
    color: #fff;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 700;
    text-decoration: none;
    border: 2px solid #0F0E14;
    box-shadow: 2px 2px 0 #7C5BE0;
  }
  .back-btn.primary {
    background: #7C5BE0;
  }
  .spinner {
    width: 22px;
    height: 22px;
    border: 3px solid #E3DEEC;
    border-top-color: #7C5BE0;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 8px auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">solo<span class="dot">metro.</span></div>
  <div id="content">
    <div class="spinner"></div>
    <div class="status">ルート情報を読み込み中...</div>
  </div>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const sharedUrl = params.get('url') || '';
const sharedText = params.get('text') || '';
const sharedTitle = params.get('title') || '';
const fullText = [sharedUrl, sharedText, sharedTitle].filter(Boolean).join(' ');

// URLが text フィールドに入って共有されてくるケースを救う
const urlInText = fullText.match(/https?:\/\/\S+/);
const effectiveUrl = sharedUrl || (urlInText ? urlInText[0] : '');

function clean(name){
  return name
    .replace(/駅$/, '')
    .replace(/\s*Station$/i, '')
    .replace(/\(.*?\)/g, '')
    .replace(/[（）]/g, '')
    .trim();
}

function parseStations(url, text){
  // Yahoo!乗換
  if (url.includes('transit.yahoo.co.jp')) {
    try {
      const u = new URL(url);
      const from = u.searchParams.get('from') || u.searchParams.get('eki1');
      const to   = u.searchParams.get('to')   || u.searchParams.get('eki2');
      if (from && to) return { from: clean(from), to: clean(to), source: 'Yahoo!乗換' };
    } catch(e) {}
  }
  // Googleマップ
  if (url.includes('google.com/maps/dir') || url.includes('maps.app.goo.gl')) {
    const match = url.match(/\/maps\/dir\/([^/?]+)\/([^/?]+)/);
    if (match) return {
      from: clean(decodeURIComponent(match[1])),
      to:   clean(decodeURIComponent(match[2])),
      source: 'Googleマップ'
    };
  }
  // テキスト中の「A → B」「A から B」「A行き」などのパターン
  const patterns = [
    /([^\s→からへ]+?)駅?\s*[→▶➡]\s*([^\s→からへ]+?)駅?(?=\s|$|[。、])/,
    /([^\s→からへ]+?)駅?\s*から\s*([^\s→からへ]+?)駅?\s*(?:へ|まで|行き)/,
    /出発[:：]\s*([^\s]+?)駅?\s+到着[:：]\s*([^\s]+?)駅?/
  ];
  for (const re of patterns) {
    const m = text.match(re);
    if (m && m[1] && m[2] && m[1] !== m[2]) {
      return { from: clean(m[1]), to: clean(m[2]), source: 'テキスト解析' };
    }
  }
  return null;
}

const result = parseStations(effectiveUrl, fullText);
const content = document.getElementById('content');

function gotoApp(from, to){
  return `/solometro/?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`;
}

if (result && result.from && result.to) {
  content.innerHTML = `
    <div class="status">ルートを見つけました</div>
    <div class="stations">
      <span>${result.from}</span>
      <span class="arrow">→</span>
      <span>${result.to}</span>
    </div>
    <div class="source">（${result.source}より）</div>
    <a class="back-btn primary" href="${gotoApp(result.from, result.to)}">
      バリアフリー情報を確認 →
    </a>
  `;
  setTimeout(() => {
    window.location.replace(gotoApp(result.from, result.to));
  }, 1500);
} else {
  const raw = (effectiveUrl || fullText || '').slice(0, 240);
  content.innerHTML = `
    <div class="status" style="text-align:left;">共有されたURLからルートを読み取れませんでした。</div>
    <div class="error">
      対応しているのは<strong>Yahoo!乗換</strong>と<strong>Googleマップ（ルート検索）</strong>の共有URLです。
    </div>
    ${raw ? `<div class="raw">${raw.replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]))}</div>` : ''}
    <a class="back-btn primary" href="/solometro/">solometroで検索する</a>
  `;
}
</script>
</body>
</html>
